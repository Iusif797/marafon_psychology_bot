services:
  - type: web
    name: marafon-bot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODE
        value: webhook
      - key: PORT
        value: 10000
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: TIMEZONE
        value: Europe/Moscow
      - key: CONTENT_CACHE_TTL
        value: "30"
